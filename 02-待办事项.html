<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记一下</title>
<link rel="manifest" href="/my-tools/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记一下">
<meta name="theme-color" content="#8b7355">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238b7355' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>📋</text></svg>">
<script>
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='flex';});
window.addEventListener('load',()=>{
  if(!window.matchMedia('(display-mode: standalone)').matches){
    if(!deferredPrompt)document.getElementById('installBtn').style.display='flex';
    let ua=navigator.userAgent,tip='';
    if(ua.includes('iPhone')||ua.includes('iPad'))tip='点 Safari 底部 <b>分享</b> → <b>添加到主屏幕</b>';
    else if(ua.includes('Android'))tip='点左上角 ⬇️ 或选菜单 → <b>安装应用</b>';
    else tip='点左上角 ⬇️ → 安装为桌面应用';
    let bar=document.createElement('div');bar.id='installTip';
    bar.innerHTML='<span>'+tip+'</span><span onclick="this.parentElement.remove()" style="cursor:pointer;margin-left:8px;font-size:16px;">✕</span>';
    bar.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:50;background:#5c4a3d;color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;max-width:90vw;text-align:center;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.2);';
    document.body.appendChild(bar);setTimeout(()=>{let t=document.getElementById('installTip');if(t)t.remove();},8000);
  }
});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBtn').style.display='none';});}else if(navigator.userAgent.includes('Edg')||navigator.userAgent.includes('Chrome'))alert('点浏览器右上角 ⋯ 菜单 → 应用 → 安装');else alert('iOS：点分享按钮 → 添加到主屏幕\n安卓：点浏览器菜单 → 安装应用');}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/my-tools/sw.js');
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"微软雅黑",sans-serif;background:#f5f0eb;display:flex;justify-content:center;padding:30px 16px 100px;min-height:100vh;color:#5c4a3d}
.app{width:460px;max-width:95vw}
[data-theme="dark"] body,[data-theme="dark"] .app{background:#1e1b18;color:#d5c8bc}
[data-theme="dark"] .day-cell,.upcoming,.mgr-list li,.mgr-search input,.modal,.sm-bg .box,.cat-sheet .sheet,.ym-picker .panel,.task-menu,.stats-panel,.cd-card,.habits-area,.focus-card{background:#2a2622;border-color:#3d3731}
[data-theme="dark"] .day-cell.other-month{background:transparent;border-color:transparent;color:#555}
[data-theme="dark"] .tl-hr{border-top-color:#333}
[data-theme="dark"] .mgr-search input,.mgr-search select,.modal input,.modal select,#newCatName{background:#2a2622;border-color:#3d3731;color:#d5c8bc}
[data-theme="dark"] .mgr-list li .mgr-text{color:#d5c8bc}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.top h1{font-size:20px}
.mon-nav{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:bold}
.mon-nav button{background:none;border:none;color:#8b7355;cursor:pointer;font-size:16px;padding:4px 6px}
.mon-label{cursor:pointer;user-select:none}
.today-btn,.theme-btn{font-size:12px;color:#8b7355;cursor:pointer;background:#fff;border:1px solid #d5c8bc;padding:4px 10px;border-radius:12px}
.theme-btn{border:none;background:none;font-size:14px;padding:4px;margin-right:4px}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.filter-row .mgr-btn,.habits-btn{font-size:12px;padding:3px 12px;border-radius:12px;border:1px solid #8b7355;background:#fff;color:#8b7355;cursor:pointer;white-space:nowrap}
.cat-filter-btn{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid #d5c8bc;background:#fff;color:#8b7355;cursor:pointer}
.cat-filter-btn.active{background:#f0e8dc}

/* 倒数日 */
.cd-section{margin:0 0 14px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.cd-card{min-width:90px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid #ede6dd;text-align:center;cursor:pointer;position:relative}
.cd-card .cd-num{font-size:22px;font-weight:bold;color:#8b7355}
.cd-card .cd-lbl{font-size:10px;color:#999}
.cd-card .cd-name{font-size:11px;color:#5c4a3d;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-card .cd-del{position:absolute;top:2px;right:4px;background:none;border:none;color:#ddd;cursor:pointer;font-size:12px;display:none}
.cd-card:hover .cd-del{display:block}
.cd-card .cd-del:hover{color:#c0392b}
.cd-add{min-width:70px;display:flex;align-items:center;justify-content:center;border:dashed 1.5px #d5c8bc;color:#ccc;font-size:20px;cursor:pointer;border-radius:8px;background:transparent}
.mood-dot{font-size:10px;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);pointer-events:none}

/* 即将到期 */
.upcoming{margin-top:14px;padding:14px 16px;background:#fff;border-radius:8px;border:1px solid #ede6dd;display:none}
.upcoming.show{display:block}
.upcoming .up-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.upcoming .up-header h4{font-size:13px;color:#c0392b}
.upcoming .up-header .warn-set{display:flex;align-items:center;gap:4px;font-size:11px;color:#999}
.upcoming .up-header .warn-set input{width:40px;padding:2px 4px;border:1px solid #d5c8bc;border-radius:3px;font-size:11px;text-align:center;outline:none}
.upcoming .up-header .warn-set select{padding:2px;border:1px solid #d5c8bc;border-radius:3px;font-size:10px;outline:none;background:#fff}
.up-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid #f5f0eb;cursor:pointer}
.up-item:last-child{border-bottom:none}
.up-item .up-date{font-size:11px;color:#c0392b;white-space:nowrap;min-width:52px}
.up-item .up-text{flex:1}
.up-item .up-cat{font-size:10px;color:#999}
.pr-high{border-left:3px solid #e74c3c}
.pr-mid{border-left:3px solid #f0a040}

.fab{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:#8b7355;color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:8;display:flex;align-items:center;justify-content:center}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:99;justify-content:center;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px 14px 0 0;padding:28px 22px 34px;width:480px;max-width:100vw;box-shadow:0 -4px 20px rgba(0,0,0,.12);animation:up .2s ease-out;max-height:90vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:16px;margin-bottom:16px}
.modal .row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.modal .row label{font-size:13px;color:#999;min-width:46px;text-align:right}
.modal input[type=text]{flex:1;padding:8px 12px;border:1px solid #d5c8bc;border-radius:4px;font-size:15px;background:#fff;outline:none}
.modal select{padding:8px 6px;border:1px solid #d5c8bc;border-radius:4px;font-size:13px;background:#fff;outline:none;color:#5c4a3d;cursor:pointer}
.modal input:focus,.modal select:focus{border-color:#b8a088}
.modal .hint{font-size:11px;color:#ccc;margin-bottom:12px;padding-left:54px}
.modal .btns{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
.modal .btns button{padding:10px 28px;border-radius:6px;border:none;cursor:pointer;font-size:15px}
.modal .btns .ok{background:#8b7355;color:#fff}
.modal .btns .cancel{background:#eee;color:#666}
.sub-list{margin:4px 0 0 54px;list-style:none}
.sub-list li{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:13px}
.sub-list li input[type=checkbox]{width:14px;height:14px;accent-color:#8b7355}
.sub-list li .sub-txt{flex:1;color:#666}
.sub-list li.done .sub-txt{text-decoration:line-through;color:#ccc}
.sub-add-row{display:flex;gap:4px;margin:4px 0 0 54px}
.sub-add-row input{flex:1;padding:4px 8px;border:1px solid #d5c8bc;border-radius:3px;font-size:12px;outline:none}
.sub-add-row button{padding:4px 10px;background:#8b7355;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px}

/* 日视图 */
.day-view{display:none;flex-direction:column}
.day-view.active{display:flex}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.day-header button{background:#fff;border:1px solid #d5c8bc;color:#8b7355;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px}
.day-header .day-title{font-size:17px;font-weight:bold;flex:1}
.all-day{margin-bottom:14px}
.all-day-label{font-size:12px;color:#999;margin-bottom:5px}
.all-day-item{display:inline-block;font-size:13px;padding:5px 14px;border-radius:14px;background:#fdfaf6;border:1.5px solid #ede6dd;margin:0 5px 5px 0;cursor:pointer}
.timeline-wrap{position:relative;margin-top:4px}
.timeline-bg{position:relative}
.timeline-bg .tl-hr{display:flex;align-items:flex-start;height:48px;border-top:1px solid #f0ebe0}
.timeline-bg .tl-hr-label{width:38px;font-size:11px;color:#bbb;padding:0 4px 0 0;text-align:right;flex-shrink:0;line-height:1}
.timeline-bg .tl-hr-line{flex:1}
.timeline-overlay{position:absolute;top:0;left:38px;right:0;bottom:0;pointer-events:none}
.timeline-overlay .task-block{position:absolute;border-radius:5px;padding:1px 6px;font-size:10px;color:#fff;cursor:pointer;pointer-events:auto;overflow:hidden;line-height:1.2;min-height:4px;box-sizing:border-box}
.task-block .tb-time{font-size:9px;opacity:.85}
.task-block .tb-title{font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.empty-tl{text-align:center;color:#ccc;padding:40px 0;font-size:13px}
.task-menu{position:fixed;z-index:200;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);padding:4px 0;min-width:120px;display:none}
.task-menu.show{display:block}
.task-menu div{padding:8px 16px;font-size:13px;cursor:pointer;color:#444}
.task-menu div:hover{background:#f5f0eb}
.task-menu div.danger{color:#c0392b}

/* 专注模式 */
.focus-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1e1b18;z-index:300;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.focus-overlay.active{display:flex}
.focus-overlay .focus-title{font-size:24px;margin-bottom:8px;text-align:center;max-width:80vw}
.focus-overlay .focus-timer{font-size:72px;font-weight:bold;margin:20px 0;font-variant-numeric:tabular-nums}
.focus-overlay .focus-label{font-size:14px;color:#999;margin-bottom:30px}
.focus-overlay .focus-btns{display:flex;gap:16px}
.focus-overlay .focus-btns button{padding:12px 30px;border-radius:30px;border:none;cursor:pointer;font-size:16px;color:#fff}
.focus-overlay .focus-btns .f-start{background:#8b7355}
.focus-overlay .focus-btns .f-pause{background:#666}
.focus-overlay .focus-btns .f-stop{background:#444}
.focus-overlay .focus-btns .f-add{background:#5a9e8f}

/* 习惯打卡 */
.habits-view{display:none;flex-direction:column}
.habits-view.active{display:flex}
.habits-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.habits-header button{background:#fff;border:1px solid #d5c8bc;color:#8b7355;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px}
.habits-header .habits-title{font-size:17px;font-weight:bold;flex:1}
.habits-area{display:flex;flex-direction:column;gap:6px}
.habit-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-radius:8px;border:1px solid #ede6dd}
.habit-row .h-emoji{font-size:22px}
.habit-row .h-info{flex:1}
.habit-row .h-name{font-size:14px;font-weight:bold}
.habit-row .h-streak{font-size:11px;color:#999}
.habit-row .h-days{display:flex;gap:3px}
.habit-row .h-day{width:22px;height:22px;border-radius:50%;border:2px solid #d5c8bc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.habit-row .h-day.done{background:#8b7355;border-color:#8b7355;color:#fff}
.habit-row .h-day.today{border-color:#8b7355}
.habits-add{display:flex;gap:6px;margin-top:10px}
.habits-add input{flex:1;padding:8px 10px;border:1px solid #d5c8bc;border-radius:4px;font-size:13px;outline:none;background:#fff}
.habits-add select{padding:8px;border:1px solid #d5c8bc;border-radius:4px;font-size:13px;outline:none;background:#fff}
.habits-add button{padding:8px 16px;background:#8b7355;color:#fff;border:none;border-radius:4px;cursor:pointer}

/* 其余 */
.cat-sheet,.ym-picker,.sm-bg,.mgr-stats,.mgr-actions,.stats-panel{/* styles kept minimal */}
.cat-sheet{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:100;justify-content:center;align-items:flex-end}
.cat-sheet.show{display:flex}
.cat-sheet .sheet{background:#fff;border-radius:14px 14px 0 0;padding:24px 22px 30px;width:400px;max-width:100vw;animation:up .2s ease-out}
.cat-sheet .sheet h3{font-size:16px;margin-bottom:14px}
.cat-sheet .sheet label{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;cursor:pointer;border-bottom:1px solid #f5f0eb}
.cat-sheet .sheet label input{accent-color:#8b7355;width:16px;height:16px}
.cat-sheet .sheet .c-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-sheet .sheet .sbtn{margin-top:14px;text-align:right}
.cat-sheet .sheet .sbtn button{padding:8px 26px;border-radius:6px;border:none;cursor:pointer;font-size:14px;background:#8b7355;color:#fff}
.ym-picker{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:100;justify-content:center;align-items:flex-start;padding-top:18vh}
.ym-picker.show{display:flex}
.ym-picker .panel{background:#fff;border-radius:10px;padding:18px 20px 22px;width:360px;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,.15);text-align:center}
.ym-picker .panel .yr-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;font-size:18px;font-weight:bold}
.ym-picker .panel .yr-row button{background:#fff;border:1px solid #d5c8bc;color:#8b7355;cursor:pointer;font-size:16px;padding:2px 10px;border-radius:4px}
.ym-picker .panel .mon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ym-picker .panel .mon-grid span{padding:10px 0;border-radius:6px;cursor:pointer;font-size:14px;background:#fdfaf6;border:1px solid #ede6dd}
.ym-picker .panel .mon-grid span.on{background:#8b7355;color:#fff;border-color:#8b7355}
.ym-picker .panel .ok-row{margin-top:14px}
.ym-picker .panel .ok-row button{padding:8px 30px;border-radius:6px;border:none;cursor:pointer;font-size:14px;background:#8b7355;color:#fff}
.sm-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:100;justify-content:center;align-items:center}
.sm-bg.show{display:flex}
.sm-bg .box{background:#fff;border-radius:10px;padding:24px;width:330px;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.sm-bg .box h3{font-size:16px;margin-bottom:14px}
.sm-bg .box input{width:100%;padding:8px 12px;border:1px solid #d5c8bc;border-radius:4px;font-size:14px;outline:none;margin-bottom:10px}
.sm-bg .box .mbtn{display:flex;gap:8px;justify-content:flex-end}
.sm-bg .box .mbtn button{padding:7px 18px;border-radius:4px;border:none;cursor:pointer;font-size:14px}
.sm-bg .box .mbtn .ok{background:#8b7355;color:#fff}
.sm-bg .box .mbtn .cancel{background:#eee;color:#666}
.exist-list{margin-bottom:12px}
.exist-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f5f0eb}
.exist-item .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.exist-item .del-cat{background:none;border:none;color:#ddd;cursor:pointer;font-size:14px}
.exist-item .del-cat:hover{color:#c0392b}
.mgr-view{display:none;flex-direction:column}
.mgr-view.active{display:flex}
.mgr-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mgr-header button,.habits-header button,.day-header button{background:#fff;border:1px solid #d5c8bc;color:#8b7355;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px}
.mgr-header .mgr-title{font-size:17px;font-weight:bold;flex:1}
.mgr-search{display:flex;gap:6px;margin-bottom:12px}
.mgr-search input{flex:1;padding:7px 10px;border:1px solid #d5c8bc;border-radius:4px;font-size:13px;background:#fff;outline:none}
.mgr-search select,.habits-add select{padding:7px 6px;border:1px solid #d5c8bc;border-radius:4px;font-size:12px;background:#fff;outline:none}
.mgr-list{list-style:none}
.mgr-list li{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-radius:4px;margin-bottom:3px;border:1px solid #ede6dd;font-size:13px}
.mgr-list li .mgr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mgr-list li .mgr-text{flex:1;color:#4a4a4a}
.mgr-list li .mgr-info{font-size:11px;color:#bbb;margin-right:4px;white-space:nowrap}
.mgr-list li.done .mgr-text{text-decoration:line-through;color:#ccc}
.mgr-list li .mgr-btns{display:flex;gap:4px}
.mgr-list li .mgr-btns button{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 6px;border-radius:3px;color:#999}
.mgr-list li .mgr-btns button:hover{background:#f5f0eb;color:#5c4a3d}
.mgr-list li .mgr-btns .mgrdel:hover{color:#c0392b}
.empty-mgr{text-align:center;color:#ccc;padding:60px 0;font-size:14px}
.mgr-stats{font-size:11px;color:#bbb;text-align:center;margin-top:12px}
.mgr-actions{display:flex;gap:6px;margin-bottom:10px}
.mgr-actions button{font-size:11px;padding:4px 10px;border-radius:12px;border:1px solid #d5c8bc;background:#fff;color:#8b7355;cursor:pointer}
.stats-panel{padding:16px;background:#fff;border-radius:8px;border:1px solid #ede6dd;margin-bottom:14px}
.stats-panel h4{font-size:14px;margin-bottom:10px}
.stats-row{display:flex;gap:12px;text-align:center}
.stat-card{flex:1;padding:10px;background:#fdfaf6;border-radius:6px}
.stat-card .num{font-size:24px;font-weight:bold;color:#8b7355}
.stat-card .lbl{font-size:11px;color:#999;margin-top:2px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:#bbb;margin-bottom:4px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{aspect-ratio:1;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;background:#fff;border:1px solid #ede6dd;position:relative;transition:all .12s}
.day-cell:hover{border-color:#8b7355;background:#fdfaf6}
.day-cell.other-month{background:transparent;border-color:transparent;color:#ddd}
.day-cell.today{border-color:#8b7355;font-weight:bold}
.day-cell .day-num{line-height:1}
.day-cell .badge{font-size:10px;background:#f0e8dc;color:#8b7355;border-radius:8px;padding:1px 5px;margin-top:1px;min-width:16px;text-align:center}
.day-cell.today .badge{background:#8b7355;color:#fff}
.bottom{margin-top:16px;font-size:12px;color:#bbb;text-align:center}
@media print{body,.app{background:#fff;padding:0}.fab,.filter-row,.top .mon-nav,.today-btn,.upcoming,.bottom,.mgr-actions,.task-menu,.modal-bg,.cat-sheet,.ym-picker,.sm-bg,#installBtn,#installTip,.cd-section{display:none!important}.day-cell{border:1px solid #ccc;font-size:11px}.day-cell .badge{background:#eee;color:#333}}
</style>
</head>
<body>
<div class="app">
  <div id="calendarView">
    <div class="top">

<!-- 分类管理弹窗 -->
<div class="sm-bg" id="catModalBg" onclick="if(event.target===this)closeCatMgr()"><div class="box"><h3>管理分类</h3><div class="exist-list" id="existList"></div><input type="text" id="newCatName" placeholder="新分类名" onkeydown="if(event.key==='Enter')addCat()"><div class="mbtn"><button class="cancel" onclick="closeCatMgr()">关</button><button class="ok" onclick="addCat()">添加</button></div></div></div>

<script>
// ── 数据 ──
let catColors=JSON.parse(localStorage.catColors||'{"学习":"#6b8e6b","生活":"#c9a96e","工作":"#7b8eaa","其他":"#bbb"}');
let catOrder=JSON.parse(localStorage.catOrder||'["学习","生活","工作","其他"]');
let tasks=JSON.parse(localStorage.todo||'[]');
let countdowns=JSON.parse(localStorage.countdowns||'[]');
let habits=JSON.parse(localStorage.habits||'[]');
let moods=JSON.parse(localStorage.moods||'{}');
let tab='all',visibleCats=null,viewYear=new Date().getFullYear(),viewMonth=new Date().getMonth(),selectedDate=null,tempSubs=[],menuTaskId=null;
let spareColors=['#e07b5a','#5a9e8f','#a07cc5','#d4a843','#5b8cc9','#c9607a','#6ea87a','#b8845c','#7b9ec7','#c98d5e'];
function randomColor(){return spareColors[Math.floor(Math.random()*spareColors.length)]}
function saveAll(){localStorage.catColors=JSON.stringify(catColors);localStorage.catOrder=JSON.stringify(catOrder);localStorage.todo=JSON.stringify(tasks);localStorage.countdowns=JSON.stringify(countdowns);localStorage.habits=JSON.stringify(habits);localStorage.moods=JSON.stringify(moods)}

// ── 深色模式 ──
function toggleTheme(){let h=document.documentElement,cur=h.getAttribute('data-theme')||'light',next=cur==='light'?'dark':'light';h.setAttribute('data-theme',next);localStorage.theme=next;document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌗'}
(function(){let t=localStorage.theme||'light';document.documentElement.setAttribute('data-theme',t);if(t==='dark')document.getElementById('themeBtn').textContent='☀️'})();

// ── 通知 ──
function requestNotif(){if('Notification' in window&&Notification.permission==='default')Notification.requestPermission()}
requestNotif();
function scheduleNotif(task){if(!('Notification' in window)||Notification.permission!=='granted')return;if(!task.timeStart||task.done)return;let when=new Date(task.dateStart+'T'+task.timeStart).getTime()-Date.now();if(when>0&&when<86400000*7)setTimeout(()=>{new Notification('📋 '+task.text,{body:'到时间了！',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%238b7355" width="100" height="100" rx="20"/><text x="50" y="68" text-anchor="middle" font-size="50" fill="white">📋</text></svg>'})},when)}

function exportData(){let data=JSON.stringify({tasks,catColors,catOrder,countdowns,habits,moods,warnHours:localStorage.warnHours||'72'},null,2);let blob=new Blob([data],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='记一下_备份_'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function importData(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=function(ev){try{let data=JSON.parse(ev.target.result);if(confirm('导入将覆盖当前数据，确定？')){tasks=data.tasks||[];catColors=data.catColors||{};catOrder=data.catOrder||[];countdowns=data.countdowns||[];habits=data.habits||[];moods=data.moods||{};if(data.warnHours)localStorage.warnHours=data.warnHours;saveAll();refreshUI();renderCalendar();closeManager();closeHabits()}}catch(ex){alert('文件格式不对')}};reader.readAsText(file);e.target.value=''}

// ── 分类管理 ──
function addCat(){let name=document.getElementById('newCatName').value.trim();if(!name||catOrder.includes(name)){document.getElementById('newCatName').value='';return};catOrder.push(name);catColors[name]=randomColor();document.getElementById('newCatName').value='';saveAll();refreshUI();openCatMgr()}
function removeCat(name){if(['学习','生活','工作','其他'].includes(name))return;catOrder=catOrder.filter(c=>c!==name);delete catColors[name];tasks=tasks.map(t=>t.cat===name?{...t,cat:'其他'}:t);saveAll();refreshUI();renderCalendar();openCatMgr()}
function openCatMgr(){document.getElementById('existList').innerHTML=catOrder.map(c=>`<div class="exist-item"><span><span class="dot" style="background:${catColors[c]}"></span>${c}</span>${['学习','生活','工作','其他'].includes(c)?'<span style="font-size:11px;color:#ccc;">默认</span>':`<button class="del-cat" onclick="removeCat('${c}')">×</button>`}</div>`).join('');document.getElementById('newCatName').value='';document.getElementById('catModalBg').classList.add('show')}
function closeCatMgr(){document.getElementById('catModalBg').classList.remove('show');refreshUI();renderCalendar()}
function openCatSheet(){let cats=visibleCats===null?new Set(catOrder):visibleCats;document.getElementById('catSheetList').innerHTML=catOrder.map(c=>`<label><input type="checkbox" value="${c}" ${cats.has(c)?'checked':''}><span class="c-dot" style="background:${catColors[c]}"></span>${c}</label>`).join('');document.getElementById('catSheet').classList.add('show')}
function closeCatSheet(){document.getElementById('catSheet').classList.remove('show')}
function applyCatFilter(){let checks=document.querySelectorAll('#catSheetList input[type=checkbox]'),sel=new Set();checks.forEach(cb=>{if(cb.checked)sel.add(cb.value)});visibleCats=(sel.size===catOrder.length)?null:sel;closeCatSheet();updateCatBtn();renderCalendar()}
function updateCatBtn(){let btn=document.getElementById('catFilterBtn');if(visibleCats===null){btn.textContent='分类 ▾';btn.classList.remove('active')}else{btn.textContent='分类 '+visibleCats.size;btn.classList.add('active')}}
function refreshUI(){updateCatBtn();document.getElementById('catInp').innerHTML=catOrder.map(c=>`<option value="${c}">${c}</option>`).join('');buildTimeSelects()}
function isVisible(t){return!(visibleCats!==null&&!visibleCats.has(t.cat))}

// ── 日期时间下拉 ──
function buildTimeSelects(){let hourOpts='<option value="">时</option>';for(let i=0;i<24;i++)hourOpts+=`<option value="${String(i).padStart(2,'0')}">${i}</option>`;let minOpts='<option value="">分</option>';for(let i=0;i<60;i+=5)minOpts+=`<option value="${String(i).padStart(2,'0')}">${i}</option>`;['sh','sm','eh','em','esh','esm','eeh','eem','cdh','cdm'].forEach(id=>{let el=document.getElementById(id);if(el)el.innerHTML=id.endsWith('h')?hourOpts:minOpts});buildDateSelects()}
function buildDateSelects(){let y=new Date().getFullYear(),yOpts='';for(let i=y-1;i<=y+5;i++)yOpts+=`<option value="${i}">${i}</option>`;let mOpts='';for(let i=1;i<=12;i++)mOpts+=`<option value="${String(i).padStart(2,'0')}">${i}</option>`;['sy','smo','ey','emo','esy','esmo','eey','eemo','cdy','cdmo'].forEach(id=>{let el=document.getElementById(id);if(el)el.innerHTML=id.endsWith('y')?yOpts:mOpts});['sd','ed','esd','eed','cdd'].forEach(id=>updateDaySelect(id))}
function updateDaySelect(dayId){let prefix=dayId.replace('d',''),yEl=document.getElementById(prefix+'y'),mEl=document.getElementById(prefix+'mo');if(!yEl||!mEl)return;let y=parseInt(yEl.value)||new Date().getFullYear(),m=parseInt(mEl.value)||1,days=new Date(y,m,0).getDate(),el=document.getElementById(dayId),cur=el?el.value:'';if(!el)return;el.innerHTML='';for(let i=1;i<=days;i++){let v=String(i).padStart(2,'0');el.innerHTML+=`<option value="${v}" ${v===cur?'selected':''}>${i}</option>`}}
['smo','emo','esmo','eemo','cdmo'].forEach(id=>{let el=document.getElementById(id);if(el)el.setAttribute('onchange',`updateDaySelect('${id.replace('mo','d')}')`)});
function readDate(yId,mId,dId){let y=document.getElementById(yId).value,m=document.getElementById(mId).value,d=document.getElementById(dId).value;return(!y||!m||!d)?'':y+'-'+m+'-'+d}
function setDate(yId,mId,dId,dateStr){if(!dateStr)return;let[p1,p2,p3]=dateStr.split('-');let ye=document.getElementById(yId),me=document.getElementById(mId),de=document.getElementById(dId);if(ye&&p1)ye.value=p1;if(me&&p2){me.value=p2;updateDaySelect(dId)}if(de&&p3)de.value=p3}
function readTime(hId,mId){let h=document.getElementById(hId).value,m=document.getElementById(mId).value;return(!h&&!m)?'':(h||'00')+':'+(m||'00')}
function setTime(hId,mId,timeStr){let elH=document.getElementById(hId),elM=document.getElementById(mId);if(!timeStr){elH.value='';elM.value='';return};let[p1,p2]=timeStr.split(':');elH.value=p1;elM.value=p2&&p2!=='00'?p2:''}

// ── 倒数日 ──
function renderCountdowns(){let html='';let now=Date.now();
  for(let i=0;i<countdowns.length;i++){let cd=countdowns[i],tStr=cd.date+(cd.time?'T'+cd.time+':00':'T00:00'),target=new Date(tStr).getTime(),diffMs=target-now,diffMin=Math.round(diffMs/60000),diffDay=Math.ceil(diffMs/86400000);
    let label,color;
    if(diffMs<0){label='已过';color='#bbb'}
    else if(diffMin<60){label=diffMin+'分钟';color='#e74c3c'}
    else if(diffMin<1440){label=Math.round(diffMin/60)+'小时';color='#e74c3c'}
    else{label=diffDay+'天';color=diffDay<=3?'#e74c3c':diffDay<=7?'#f0a040':diffDay<=30?'#8b7355':'#bbb';}
    html+=`<div class="cd-card" title="${cd.name} - ${cd.date}${cd.time?' '+cd.time:''}"><div class="cd-num" style="color:${color}">${label}</div><div class="cd-name">${cd.name}</div><div class="cd-lbl">${diffMs>0?'倒计时':''}</div><button class="cd-del" onclick="event.stopPropagation();removeCountdown(${i})">×</button></div>`}
  html+='<div class="cd-add" onclick="openCdAdd()">+</div>';
  document.getElementById('cdSection').innerHTML=html}
function openCdAdd(){document.getElementById('cdModalBg').classList.add('show');let def=new Date().toISOString().slice(0,10);setDate('cdy','cdmo','cdd',def);document.getElementById('cdh').value='';document.getElementById('cdm').value=''}
function closeCdAdd(){document.getElementById('cdModalBg').classList.remove('show')}
function addCountdown(){let name=document.getElementById('cdName').value.trim();if(!name)return;let date=readDate('cdy','cdmo','cdd');if(!date)return;let h=document.getElementById('cdh').value,m=document.getElementById('cdm').value,time=(h||m)?(h||'00')+':'+(m||'00'):'';countdowns.push({name,date,time});saveAll();closeCdAdd();renderCountdowns()}
function removeCountdown(i){countdowns.splice(i,1);saveAll();renderCountdowns()}

// ── 心情 ──
function setMood(dateStr,emoji){if(moods[dateStr]===emoji){delete moods[dateStr]}else{moods[dateStr]=emoji};saveAll();renderCalendar()}
let MOODS=['😊','😐','😢','😡','🤩','😴','😰','🥰'];

// ── 习惯打卡 ──
function openHabits(){document.getElementById('calendarView').style.display='none';document.getElementById('habitsView').classList.add('active');document.getElementById('fabBtn').style.display='none';renderHabits()}
function closeHabits(){document.getElementById('calendarView').style.display='';document.getElementById('habitsView').classList.remove('active');document.getElementById('fabBtn').style.display='flex';renderCalendar()}
function addHabit(){let name=document.getElementById('habitName').value.trim();if(!name)return;let emoji=document.getElementById('habitEmoji').value;habits.push({id:Date.now(),name,emoji,dates:{}});document.getElementById('habitName').value='';saveAll();renderHabits()}
function toggleHabitDate(habitId,dateStr){let h=habits.find(h=>h.id===habitId);if(!h)return;if(h.dates[dateStr]){delete h.dates[dateStr]}else{h.dates[dateStr]=true};saveAll();renderHabits()}
function renderHabits(){let today=new Date().toISOString().slice(0,10),last7=[];
  for(let i=6;i>=0;i--){let d=new Date();d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10))}
  let html='';habits.sort((a,b)=>b.id-a.id);
  for(let h of habits){let streak=0;for(let i=0;i<30;i++){let d=new Date();d.setDate(d.getDate()-i);if(h.dates[d.toISOString().slice(0,10)])streak++;else break}

function openYmPicker(){ymYear=viewYear;ymPickMonth=viewMonth;renderYmPanel();document.getElementById('ymPicker').classList.add('show')}
function closeYmPicker(){document.getElementById('ymPicker').classList.remove('show')}
function renderYmPanel(){document.getElementById('ymYearLabel').textContent=ymYear;let months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],h='';for(let i=0;i<12;i++)h+=`<span class="${i===ymPickMonth?'on':''}" onclick="ymPickMonth=${i};renderYmPanel()">${months[i]}</span>`;document.getElementById('ymMonGrid').innerHTML=h}
function confirmYmPicker(){viewYear=ymYear;viewMonth=ymPickMonth;selectedDate=null;closeYmPicker();renderCalendar()}
refreshUI();renderCalendar();
</script>
</body>
</html>
